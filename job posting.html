<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - JobPortal</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #E3FDFD;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .job-container {
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
        }

        .job-box {
            background-color: #BBD5DA;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
        }

        .job-box h2 {
            font-size: 1.75rem;
            color: #111827;
            margin-bottom: 0.25rem;
        }

        .job-box p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #4b5563;
            margin-bottom: 0.4rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 1px #4f46e5;
        }

        .btn-submit {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="job-container">
        <div class="job-box">
            <h2>Post a New Job</h2>
            <p>Fill in the details below to find the perfect candidate.</p>
            
            <form>
                <div class="form-group">
                    <label for="jobTitle">Job Title</label>
                    <input type="text" id="jobTitle" placeholder="e.g. Senior Product Designer" required>
                </div>

                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" placeholder="e.g. Acme Corp" required>
                </div>

                <div class="form-group">
                    <label for="jobType">Job Type</label>
                    <select id="jobType">
                        <option value="full_time">Full Time</option>
                        <option value="part_time">Part Time</option>
                        <option value="contract">Contract</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="salary">Estimated Salary ($)</label>
                    <input type="number" id="salary" placeholder="e.g. 80000" required>
                </div>

                <div class="form-group">
                    <label for="jobDescription">Job Description</label>
                    <textarea id="jobDescription" rows="4" placeholder="Enter roles and requirements..." required></textarea>
                </div>

                <button type="button" class="btn-submit" onclick="alert('Job posted successfully!')">Publish Job Listing</button>
            </form>
        </div>
    </div>

</body>
</html>
