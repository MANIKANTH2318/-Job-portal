<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - JobPortal</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #E3FDFD;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .upload-container {
            width: 100%;
            max-width: 450px;
            padding: 1.5rem;
        }

        .upload-box {
            background-color: #BBD5DA;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        .upload-box h2 {
            font-size: 1.75rem;
            color: #111827;
            margin-bottom: 0.25rem;
        }

        .upload-box p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .drop-area {
            border: 2px dashed #d1d5db;
            padding: 2.5rem 1.5rem;
            border-radius: 8px;
            background-color: #f9fafb;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            margin-bottom: 1.5rem;
        }

        .drop-area:hover {
            border-color: #4f46e5;
            background-color: #f0fdf4;
        }

        .drop-area p {
            margin-bottom: 0;
            color: #4b5563;
        }

        .drop-area span {
            color: #4f46e5;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #4b5563;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
        }

        .form-group input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 1px #4f46e5;
        }

        .btn-submit {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: #4338ca;
        }
        
        .file-info {
            font-size: 0.85rem;
            color: #059669;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <div class="upload-box">
            <h2>Upload Resume</h2>
            <p>Add your CV or resume to apply to jobs with 1-click.</p>
            
            <div class="drop-area" onclick="document.getElementById('resumeFile').click()">
                <p>Click or drag your file here to upload<br><span>Browse File</span></p>
                <input type="file" id="resumeFile" style="display: none" onchange="showFileName()">
                <p id="fileNameDisplay" class="file-info"></p>
            </div>
            
            <form>
                <div class="form-group">
                    <label for="profileTitle">Professional Title</label>
                    <input type="text" id="profileTitle" placeholder="e.g. Senior Software Engineer" required>
                </div>

                <div class="form-group">
                    <label for="experience">Years of Experience</label>
                    <input type="number" id="experience" placeholder="e.g. 3" required>
                </div>

                <button type="button" class="btn-submit" onclick="alert('Resume uploaded successfully!')">Save & Submit</button>
            </form>
        </div>
    </div>

    <script>
        function showFileName() {
            const input = document.getElementById('resumeFile');
            const display = document.getElementById('fileNameDisplay');
            
            if (input.files.length > 0) {
                display.style.display = 'block';
                display.textContent = 'Selected file: ' + input.files[0].name;
            } else {
                display.style.display = 'none';
            }
        }
    </script>

</body>
</html>
