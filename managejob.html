<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs - Admin Panel</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            min-height: 100vh;
        }

        /* Container Styling */
        .content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* Action Button */
        .btn-add {
            background-color: #6366f1;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #4f46e5;
        }

        /* Table Styling */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f1f5f9;
            padding: 1rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* Status Badge */
        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-active { background: #dcfce7; color: #15803d; }
        .status-closed { background: #fee2e2; color: #b91c1c; }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit {
            color: #6366f1;
            background: none;
            border: 1px solid #6366f1;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-delete {
            color: #ef4444;
            background: none;
            border: 1px solid #ef4444;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-edit:hover { background: #6366f1; color: white; }
        .btn-delete:hover { background: #ef4444; color: white; }

    </style>
</head>
<body>

    <div class="content">
        <div class="header">
            <h2>Manage Jobs</h2>
            <a href="#" class="btn-add">+ Post New Job</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Senior React Developer</strong></td>
                        <td>TechFlow Inc.</td>
                        <td>Development</td>
                        <td><span class="status status-active">Active</span></td>
                        <td class="actions">
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>UI/UX Designer</strong></td>
                        <td>Creative Studio</td>
                        <td>Design</td>
                        <td><span class="status status-active">Active</span></td>
                        <td class="actions">
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>Marketing Manager</strong></td>
                        <td>Global Brand</td>
                        <td>Marketing</td>
                        <td><span class="status status-closed">Closed</span></td>
                        <td class="actions">
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
